p2p_no_group_iface=1
driver_param=use_p2p_group_interface=1
wowlan_triggers=disconnect
p2p_disabled=1
bss_no_flush_when_down=1
# Eski router uyumluluğu: WPA/WPA2 mixed mode ve TKIP group cipher
wpa_allow_tkip_in_gt=1
# BSS expiration: eski router'ların beacon aralığı uzun olabilir
bss_expiration_age=180
# Bağlantı denemesi sayısını artır — eski router'lar yavaş yanıt verebilir
max_num_sta=10
